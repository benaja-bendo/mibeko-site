services:
  site:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: mibeko-site
    restart: unless-stopped
    networks: [proxy]
    environment:
      - HOST=0.0.0.0
      - PORT=4321
      # API Laravel consommée par le serveur SSR. Surchargeable via .env (CI).
      - MIBEKO_API_URL=${MIBEKO_API_URL:-https://api.mibeko.fr/api/v1}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"

      - "traefik.http.routers.mibeko-site.rule=Host(`${MIBEKO_SITE_HOST:-mibeko.fr}`)"
      - "traefik.http.routers.mibeko-site.entrypoints=websecure"
      - "traefik.http.routers.mibeko-site.tls.certresolver=myresolver"
      - "traefik.http.routers.mibeko-site.priority=1"

      # Serveur SSR Astro (adapter @astrojs/node) — écoute sur 4321.
      - "traefik.http.services.mibeko-site.loadbalancer.server.port=4321"

networks:
  proxy:
    external: true
