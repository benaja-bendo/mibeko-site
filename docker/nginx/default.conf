server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gestion des assets statiques d'Astro (immutables)
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # Gestion des autres assets (images, favicon, etc.)
  location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf|webp|avif)$ {
    expires 6M;
    add_header Cache-Control "public";
    access_log off;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Page d'erreur 404
  error_page 404 /404.html;
  location = /404.html {
    internal;
  }
}